<!DOCTYPE html>
<html lang="kk-KZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренды Teez / Трендтері</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root {
            --bg-color: #FFFFFF;
            --card-bg: #F8F9FA;
            --kz-color: #118B11;
            --ru-color: #111111;
            --accent-green: #B4FF87;
            --gray-text: #666666;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--ru-color);
            padding: 30px 0;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header { margin-bottom: 40px; text-align: center; }

        .logo { font-weight: 800; font-size: 36px; letter-spacing: -1px; margin-bottom: 12px; }
        .logo div:first-child { color: var(--kz-color); }
        .logo div:last-child { color: var(--ru-color); font-size: 24px; opacity: 0.8; }

        .date-badge {
            display: inline-block;
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--ru-color);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .section-title .kz { color: var(--kz-color); }
        .section-title .ru { font-size: 16px; font-weight: 600; color: var(--gray-text); }

        .chart-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 40px;
            border: 1px solid #EAEAEA;
        }

        /* Вкладки (Табы) */
        .tabs-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid #EAEAEA;
            padding: 10px 20px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tab-btn .kz { color: var(--kz-color); font-size: 14px; }
        .tab-btn .ru { color: var(--gray-text); font-size: 12px; font-weight: 400; }

        .tab-btn.active {
            background: var(--ru-color);
            border-color: var(--ru-color);
        }
        .tab-btn.active .kz, .tab-btn.active .ru { color: #FFF; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #EAEAEA;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            background: var(--accent-green);
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }

        .product-info { padding: 20px; display: flex; flex-direction: column; height: 100%;}
        
        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--ru-color);
            line-height: 1.3;
        }

        .product-price {
            font-size: 24px;
            font-weight: 800;
            color: var(--ru-color);
            margin-bottom: 20px;
            margin-top: auto;
        }

        .buy-button {
            display: block;
            background: var(--accent-green);
            color: #000;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
        }

        footer {
            margin-top: 60px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #EAEAEA;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        </div>

    <script>
        /**
         * БАЗА ДАННЫХ
         */
        const DATA = {
            header: {
                week: { kz: "15 — 21 сәуір", ru: "15 — 21 апреля" }
            },
            
            // Аналитика роста категорий (для графика)
            analytics: [
                { name: "Кроссовки", kz: "Спорттық аяқ киім", growth: 45 },
                { name: "Электроника", kz: "Электроника", growth: 38 },
                { name: "Верхняя одежда", kz: "Сыртқы киім", growth: 25 },
                { name: "Косметика", kz: "Косметика", growth: 18 }
            ],

            // Категории для фильтра
            categories: [
                { id: "all", kz: "Барлығы", ru: "Все" },
                { id: "tech", kz: "Электроника", ru: "Электроника" },
                { id: "clothes", kz: "Киім", ru: "Одежда" }
            ],

            // Товары (добавлен параметр categoryId для фильтра)
            products: [
                {
                    categoryId: "clothes",
                    image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600&auto=format&fit=crop",
                    badge: { kz: "Апта хиті", ru: "Хит недели" },
                    title: "Nike Air Max 270 React",
                    price: "49 990 ₸",
                    link: "#"
                },
                {
                    categoryId: "tech",
                    image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=600&auto=format&fit=crop",
                    badge: { kz: "ТОП", ru: "ТОП" },
                    title: "Sony WH-1000XM4 Wireless",
                    price: "185 000 ₸",
                    link: "#"
                },
                {
                    categoryId: "tech",
                    image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=600&auto=format&fit=crop",
                    badge: { kz: "Тренд", ru: "Тренд" },
                    title: "Apple Watch Series 9",
                    price: "240 000 ₸",
                    link: "#"
                },
                {
                    categoryId: "clothes",
                    image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600&auto=format&fit=crop",
                    badge: { kz: "Жаңа", ru: "Новинка" },
                    title: "Худи Essentials",
                    price: "28 000 ₸",
                    link: "#"
                }
            ]
        };

        let currentCategory = "all";

        function renderDashboard() {
            const app = document.getElementById('app');
            
            // 1. Шапка
            let html = `
                <header>
                    <div class="logo">
                        <div>TEEZ ТРЕНДТЕРІ</div>
                        <div>ТРЕНДЫ TEEZ</div>
                    </div>
                    <div class="date-badge">
                        <span style="color: var(--kz-color)">${DATA.header.week.kz}</span> | 
                        <span style="color: var(--ru-color)">${DATA.header.week.ru}</span>
                    </div>
                </header>
            `;

            // 2. Блок с графиком аналитики
            html += `
                <div class="section-title">
                    <span class="kz">Сұраныстың өсуі (%)</span>
                    <span class="ru">Рост спроса по категориям (%)</span>
                </div>
                <div class="chart-card">
                    <div id="analyticsChart"></div>
                </div>
            `;

            // 3. Товары и фильтры
            html += `
                <div class="section-title" style="margin-top: 40px;">
                    <span class="kz">Үздік тауарлар</span>
                    <span class="ru">Топ товары</span>
                </div>
            `;

            // Рендер вкладок
            html += `<div class="tabs-container">`;
            DATA.categories.forEach(cat => {
                const isActive = cat.id === currentCategory ? 'active' : '';
                html += `
                    <div class="tab-btn ${isActive}" onclick="filterProducts('${cat.id}')">
                        <span class="kz">${cat.kz}</span>
                        <span class="ru">${cat.ru}</span>
                    </div>
                `;
            });
            html += `</div>`;

            // Рендер сетки товаров
            html += `<main class="products-grid" id="productsGrid">`;
            html += generateProductsHTML(DATA.products);
            html += `</main>`;

            // Футер
            html += `
                <footer>
                    <div style="color: var(--kz-color); font-size: 13px; font-weight: 600;">© 2024 Teez Business. Барлық құқықтар қорғалған.</div>
                    <div style="color: var(--gray-text); font-size: 12px;">Все права защищены.</div>
                </footer>
            `;

            app.innerHTML = html;
            renderChart();
        }

        // Функция фильтрации товаров
        window.filterProducts = function(categoryId) {
            currentCategory = categoryId;
            
            // Обновляем визуальное состояние кнопок
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Фильтруем данные
            const filteredProducts = categoryId === 'all' 
                ? DATA.products 
                : DATA.products.filter(p => p.categoryId === categoryId);
            
            // Обновляем сетку
            document.getElementById('productsGrid').innerHTML = generateProductsHTML(filteredProducts);
        }

        function generateProductsHTML(products) {
            if (products.length === 0) return `<div style="padding: 20px; color: var(--gray-text);">Тауарлар табылмады / Нет товаров</div>`;
            
            return products.map(prod => `
                <div class="product-card">
                    <div class="product-image" style="background-image: url('${prod.image}')">
                        <div class="badge">
                            <span>${prod.badge.kz}</span>
                            <span style="font-size: 9px; font-weight: 400;">${prod.badge.ru}</span>
                        </div>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${prod.title}</div>
                        <div class="product-price">${prod.price}</div>
                        <a href="${prod.link}" class="buy-button">Көру / Посмотреть</a>
                    </div>
                </div>
            `).join('');
        }

        // Настройка графика
        function renderChart() {
            var options = {
                series: [{
                    name: 'Рост спроса (%)',
                    data: DATA.analytics.map(item => item.growth)
                }],
                chart: {
                    type: 'bar',
                    height: 350,
                    toolbar: { show: false },
                    fontFamily: 'Inter, sans-serif'
                },
                colors: ['#B4FF87'],
                plotOptions: {
                    bar: { borderRadius: 6, horizontal: true, distributed: true }
                },
                dataLabels: {
                    enabled: true,
                    formatter: function (val) { return "+" + val + "%" },
                    style: { colors: ['#000'], fontWeight: 800 }
                },
                xaxis: {
                    categories: DATA.analytics.map(item => item.name),
                },
                legend: { show: false }
            };

            var chart = new ApexCharts(document.querySelector("#analyticsChart"), options);
            chart.render();
        }

        document.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
</body>
</html>
